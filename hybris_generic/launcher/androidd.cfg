{
    "services" : [{
            "name" : "androidd",
            "path" : [ "/system/bin/androidd" ],
            "uid" : "root",
            "gid" : [ "root" ],
            "caps" : [
                "SYS_ADMIN", "MKNOD", "NET_ADMIN", "DAC_OVERRIDE",
                "SYS_RESOURCE", "SYS_PTRACE", "CHOWN", "FOWNER",
                "FSETID", "KILL", "NET_RAW", "SETUID", "SETGID",
                "SETPCAP", "SETFCAP", "AUDIT_WRITE", "SYS_NICE",
                "SYS_BOOT", "SYS_TTY_CONFIG", "SYS_MODULE",
                "WAKE_ALARM", "BLOCK_SUSPEND", "SYSLOG",
                "DAC_READ_SEARCH",
                "AUDIT_CONTROL", "IPC_LOCK", "NET_BIND_SERVICE",
                "SYS_RAWIO", "SYS_CHROOT"
            ],
            "start-mode" : "boot",
            "importance" : -10,
            "sandbox" : 0,
            "critical" : [ 1, 5, 60 ]
        }
    ],
    "jobs" : [{
            "name" : "post-fs-data",
            "cmds" : [
                "start androidd"
            ]
        }
    ]
}
