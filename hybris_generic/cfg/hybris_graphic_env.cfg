{
    "services" : [{
            "name" : "render_service",
            "path" : ["/system/bin/render_service"],
            "critical" : [1, 5, 60],
            "importance" : -20,
            "uid" : "graphics",
            "gid" : ["system", "tp_host", "data_reserve", "dev_dma_heap", "composer_host"],
            "writepid" : ["/dev/memcg/perf_critical/cgroup.procs"],
            "caps" : ["SYS_NICE"],
            "bootevents": [
                "bootevent.renderservice.ready"
            ],
            "permission" : [
                "ohos.permission.REPORT_RESOURCE_SCHEDULE_EVENT",
                "ohos.permission.MANAGE_SETTINGS",
                "ohos.permission.KILL_APP_PROCESSES"
            ],
            "secon" : "u:r:render_service:s0",
            "jobs" : {
                "on-restart" : "services:restartrender_service"
            },
            "once" : 0,
            "env" : [
                {
                    "name" : "LIBEGL",
                    "value" : "/android/vendor/lib64/egl/libGLES_mali.so"
                },
                {
                    "name" : "LIBGLESV2",
                    "value" : "/android/vendor/lib64/egl/libGLES_mali.so"
                },
                {
                    "name" : "HYBRIS_LD_LIBRARY_PATH",
                    "value" : "/android/vendor/lib64:/android/system/lib64:/android/system/system/lib64"
                },
                {
                    "name" : "LD_LIBRARY_PATH",
                    "value" : "/system/lib64/libhybris:/system/lib64"
                },
                {
                    "name" : "HYBRIS_EGLPLATFORM",
                    "value" : "ohos"
                }
            ]
        },
        {
            "name" : "bootanimation",
            "path" : ["/system/bin/bootanimation"],
            "uid" : "graphics",
            "gid" : ["graphics", "data_reserve"],
            "env" : [
                {
                    "name" : "LIBEGL",
                    "value" : "/android/vendor/lib64/egl/libGLES_mali.so"
                },
                {
                    "name" : "LIBGLESV2",
                    "value" : "/android/vendor/lib64/egl/libGLES_mali.so"
                },
                {
                    "name" : "HYBRIS_LD_LIBRARY_PATH",
                    "value" : "/android/vendor/lib64:/android/system/lib64:/android/system/system/lib64"
                },
                {
                    "name" : "LD_LIBRARY_PATH",
                    "value" : "/system/lib64/libhybris:/system/lib64"
                },
                {
                    "name" : "HYBRIS_EGLPLATFORM",
                    "value" : "ohos"
                }
            ]
        }
    ]
}
